<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=5.0">
<title>ماسح الأوبشن الأمريكي PRO</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@400;500;600;700;800&family=IBM+Plex+Mono:wght@400;600;700&display=swap" rel="stylesheet">
<style>
:root{--c0:#060a13;--c1:#0a0f1a;--c2:#0e1525;--c3:#131c2e;--c4:#1a2540;--bd:rgba(255,255,255,.06);--bd2:rgba(255,255,255,.12);--t1:#e2e8f0;--t2:#7a8ba8;--t3:#475569;--up:#00e5a0;--dn:#ef4444;--bl:#3b82f6;--bl2:rgba(59,130,246,.12);--gd:#fbbf24;--pu:#a855f7;--cy:#22d3ee;--hot:#ff6b35;--warn:#f59e0b}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;background:var(--c0);color:var(--t1);font-family:'IBM Plex Sans Arabic',sans-serif;font-size:12px;overflow-x:hidden}
.mono{font-family:'IBM Plex Mono',monospace}
::-webkit-scrollbar{width:4px;height:4px}::-webkit-scrollbar-track{background:var(--c0)}::-webkit-scrollbar-thumb{background:var(--c4);border-radius:4px}
.topbar{position:sticky;top:0;z-index:100;background:rgba(10,15,26,.95);backdrop-filter:blur(12px);border-bottom:1px solid var(--bd);padding:8px 12px;display:flex;align-items:center;justify-content:space-between;gap:8px}
.logo{display:flex;align-items:center;gap:8px}
.logo-icon{width:32px;height:32px;background:linear-gradient(135deg,var(--up),var(--bl));border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:800;color:#fff}
.logo-txt{font-size:11px;font-weight:700;color:var(--up);letter-spacing:1.5px}
.logo-sub{font-size:9px;color:var(--t3)}
.scan-btn{padding:7px 16px;border:1px solid rgba(0,229,160,.3);background:rgba(0,229,160,.08);color:var(--up);border-radius:8px;font-size:11px;font-weight:700;cursor:pointer;transition:all .2s;font-family:inherit;position:relative;overflow:hidden}
.scan-btn:hover{background:rgba(0,229,160,.15)}
.scan-btn.scanning{color:var(--t3);border-color:var(--bd)}
.scan-btn.scanning::after{content:'';position:absolute;inset:0;background:linear-gradient(90deg,transparent,rgba(0,229,160,.1),transparent);animation:scanLine 1.5s infinite}
@keyframes scanLine{0%{transform:translateX(-100%)}100%{transform:translateX(100%)}}
.stats-bar{display:flex;gap:6px;padding:8px 12px;overflow-x:auto;background:var(--c1);border-bottom:1px solid var(--bd)}.stats-bar::-webkit-scrollbar{display:none}
.stat-chip{flex-shrink:0;display:flex;align-items:center;gap:6px;padding:5px 10px;border-radius:8px;border:1px solid var(--bd);background:var(--c2)}
.stat-icon{font-size:11px}.stat-label{font-size:9px;color:var(--t3)}.stat-val{font-size:12px;font-weight:700}
.quick-bar{display:flex;gap:5px;padding:6px 12px;overflow-x:auto;background:var(--c1);border-bottom:1px solid var(--bd)}.quick-bar::-webkit-scrollbar{display:none}
.qbtn{flex-shrink:0;padding:6px 14px;border-radius:8px;border:1px solid;font-size:10px;font-weight:700;cursor:pointer;transition:all .15s;font-family:inherit;display:flex;align-items:center;gap:4px}
.qbtn.q-0dte{border-color:rgba(239,68,68,.3);background:rgba(239,68,68,.06);color:var(--dn)}.qbtn.q-0dte.on{background:rgba(239,68,68,.2)}
.qbtn.q-whale{border-color:rgba(251,191,36,.3);background:rgba(251,191,36,.06);color:var(--gd)}.qbtn.q-whale.on{background:rgba(251,191,36,.2)}
.qbtn.q-explode{border-color:rgba(255,107,53,.3);background:rgba(255,107,53,.06);color:var(--hot)}.qbtn.q-explode.on{background:rgba(255,107,53,.2)}
.qbtn.q-bounce{border-color:rgba(0,229,160,.3);background:rgba(0,229,160,.06);color:var(--up)}.qbtn.q-bounce.on{background:rgba(0,229,160,.2)}
.qbtn.q-aggr{border-color:rgba(168,85,247,.3);background:rgba(168,85,247,.06);color:var(--pu)}.qbtn.q-aggr.on{background:rgba(168,85,247,.2)}
.filter-bar{display:flex;gap:4px;padding:6px 12px;overflow-x:auto;background:var(--c1);border-bottom:1px solid var(--bd);align-items:center}.filter-bar::-webkit-scrollbar{display:none}
.fbtn{flex-shrink:0;padding:5px 12px;border-radius:6px;border:1px solid var(--bd);background:transparent;color:var(--t3);font-size:10px;font-weight:600;cursor:pointer;transition:all .15s;font-family:inherit}
.fbtn.on{background:rgba(0,229,160,.1);color:var(--up);border-color:rgba(0,229,160,.3)}
.fbtn.blue{background:var(--bl2);color:var(--bl);border-color:rgba(59,130,246,.3)}
.sep{width:1px;background:var(--bd);margin:0 2px;flex-shrink:0;height:20px}
.dte-select{padding:4px 8px;border-radius:6px;border:1px solid var(--bd);background:var(--c2);color:var(--t1);font-size:10px;font-family:inherit;cursor:pointer;outline:none}
.sector-bar{display:flex;gap:3px;padding:4px 12px;overflow-x:auto;background:var(--c0);border-bottom:1px solid var(--bd)}.sector-bar::-webkit-scrollbar{display:none}
.sbtn{flex-shrink:0;padding:3px 8px;border-radius:4px;border:none;background:transparent;color:var(--t3);font-size:9px;cursor:pointer;font-family:inherit}.sbtn.on{background:rgba(168,85,247,.1);color:var(--pu)}
.cards{padding:8px;display:flex;flex-direction:column;gap:8px}
.card{background:var(--c2);border:1px solid var(--bd);border-radius:12px;overflow:hidden;cursor:pointer;transition:all .2s}.card:active{transform:scale(.98)}
.card.tier-gold{border-color:rgba(251,191,36,.25);background:rgba(251,191,36,.04);box-shadow:0 0 20px rgba(251,191,36,.06)}
.card.tier-silver{border-color:rgba(148,163,184,.2);background:rgba(148,163,184,.03)}
.card.tier-bronze{border-color:rgba(180,83,9,.15);background:rgba(180,83,9,.03)}
.card-head{padding:10px 12px 6px;display:flex;align-items:flex-start;justify-content:space-between}
.card-ticker{display:flex;align-items:center;gap:8px}
.card-icon{width:36px;height:36px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:800}
.card-icon.call{background:rgba(0,229,160,.1);color:var(--up);border:1px solid rgba(0,229,160,.2)}
.card-icon.put{background:rgba(239,68,68,.1);color:var(--dn);border:1px solid rgba(239,68,68,.2)}
.card-sym{font-size:13px;font-weight:700}.card-detail{font-size:10px;color:var(--t3)}
.card-ask{text-align:left}.card-ask-price{font-size:14px;font-weight:700}.card-ask-label{font-size:9px;color:var(--t3)}
.badges{padding:2px 12px 6px;display:flex;flex-wrap:wrap;gap:4px}
.badge{display:inline-flex;align-items:center;gap:3px;padding:2px 6px;border-radius:4px;font-size:9px;font-weight:600}
.badge-up{background:rgba(0,229,160,.1);color:var(--up);border:1px solid rgba(0,229,160,.2)}
.badge-strong{background:rgba(0,229,160,.2);color:#fff;border:1px solid var(--up)}
.badge-hot{background:rgba(255,107,53,.1);color:var(--hot);border:1px solid rgba(255,107,53,.2)}
.badge-gold{background:rgba(251,191,36,.1);color:var(--gd);border:1px solid rgba(251,191,36,.2)}
.badge-pu{background:rgba(168,85,247,.1);color:var(--pu);border:1px solid rgba(168,85,247,.2)}
.badge-warn{background:rgba(245,158,11,.1);color:var(--warn);border:1px solid rgba(245,158,11,.2)}
.badge-dn{background:rgba(239,68,68,.1);color:var(--dn);border:1px solid rgba(239,68,68,.2)}
.badge-muted{background:rgba(71,85,105,.1);color:var(--t3);border:1px solid rgba(71,85,105,.2)}
.badge-whale{background:linear-gradient(135deg,rgba(251,191,36,.15),rgba(255,107,53,.15));color:var(--gd);border:1px solid rgba(251,191,36,.3);font-weight:800}
.badge.pulse{animation:pulse 2s infinite}@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}
.card-metrics{padding:2px 12px 6px;display:grid;grid-template-columns:repeat(4,1fr);gap:6px}
.metric-label{font-size:9px;color:var(--t3)}.metric-val{font-size:11px;font-weight:700}
.card-metrics2{padding:0 12px 6px;display:grid;grid-template-columns:repeat(3,1fr);gap:6px}
.card-bottom{padding:4px 12px 8px;display:flex;align-items:flex-end;justify-content:space-between}
.sparkline{width:120px;height:30px}
.entry-btn{display:inline-flex;align-items:center;gap:4px;padding:4px 10px;border-radius:6px;font-size:10px;font-weight:700;border:1px solid rgba(0,229,160,.2);background:rgba(0,229,160,.06);color:var(--up)}
.entry-btn.at-entry{animation:pulse 1.5s infinite;border-color:var(--up);background:rgba(0,229,160,.15);box-shadow:0 0 12px rgba(0,229,160,.3)}
.exp-bar{padding:4px 12px 10px}.exp-track{height:4px;border-radius:4px;background:var(--c4);overflow:hidden}
.exp-fill{height:100%;border-radius:4px;transition:width .7s}.exp-row{display:flex;align-items:center;gap:6px}
.exp-pct{font-size:10px;font-weight:700;min-width:30px;text-align:left}
.desk-wrap{display:none;margin:8px;border-radius:12px;overflow:hidden;border:1px solid var(--bd)}
.desk-wrap table{width:100%;border-collapse:collapse}
.desk-wrap th{padding:7px 6px;font-size:9px;font-weight:600;color:var(--t3);text-align:right;background:var(--c2);border-bottom:1px solid var(--bd);white-space:nowrap}
.desk-wrap td{padding:5px 6px;font-size:10px;border-bottom:1px solid var(--bd);white-space:nowrap}
.desk-wrap tr{cursor:pointer;transition:background .15s}.desk-wrap tr:hover{background:var(--c3)!important}
.desk-wrap tr.sel{background:rgba(0,229,160,.04)!important}
.desk-wrap tr.tier-gold{background:rgba(251,191,36,.04);border-right:3px solid var(--gd)}
.desk-wrap tr.tier-silver{background:rgba(148,163,184,.03);border-right:3px solid #94a3b8}
.desk-wrap tr.tier-bronze{background:rgba(180,83,9,.03);border-right:3px solid #b45309}
.chart-section{margin:8px;border-radius:12px;border:1px solid var(--bd);background:var(--c2);overflow:hidden}
.chart-header{padding:10px 16px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--bd)}
.chart-header h3{font-size:13px;font-weight:700}
.chart-canvas-wrap{position:relative;height:300px;padding:8px}.chart-canvas-wrap canvas{width:100%;height:100%}
.under-panel{display:none;margin:0 8px 8px;border-radius:12px;border:1px solid var(--bd);background:var(--c2);overflow:hidden}
.under-head{padding:12px 16px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--bd)}
.under-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;padding:16px}
.under-section h4{font-size:10px;font-weight:600;color:var(--t3);text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px}
.sheet-overlay{position:fixed;inset:0;z-index:200;background:rgba(0,0,0,.6);backdrop-filter:blur(4px);display:none;flex-direction:column;justify-content:flex-end}
.sheet-overlay.show{display:flex}
.sheet{background:var(--c1);border-radius:16px 16px 0 0;max-height:75vh;overflow:hidden;border-top:1px solid var(--bd2);transition:transform .3s}
.sheet-handle{display:flex;justify-content:center;padding:8px 0 4px}.sheet-handle div{width:36px;height:3px;border-radius:3px;background:var(--t3)}
.sheet-header{padding:8px 16px 10px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--bd)}
.sheet-close{width:28px;height:28px;border-radius:50%;background:var(--c4);border:none;color:var(--t2);font-size:14px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.sheet-tabs{display:flex;padding:8px 16px 0;gap:4px}
.sheet-tab{flex:1;padding:7px;border-radius:8px;border:1px solid var(--bd);background:transparent;color:var(--t3);font-size:9px;font-weight:600;cursor:pointer;font-family:inherit}
.sheet-tab.on{background:rgba(0,229,160,.08);color:var(--up);border-color:rgba(0,229,160,.2)}
.sheet-content{padding:16px;overflow-y:auto;max-height:50vh}
.level-row{display:flex;align-items:center;justify-content:space-between;padding:6px 0}
.level-dot{width:6px;height:6px;border-radius:50%}.level-line{flex:1;margin:0 8px;border-bottom:1px dashed var(--bd)}
.target-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:10px}
.sig-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px}
.sig-box{padding:8px;border-radius:8px;background:var(--c2);border:1px solid var(--bd)}.sig-box-label{font-size:9px;color:var(--t3);margin-bottom:4px}
.greeks-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:6px}
.greek-box{padding:6px;border-radius:6px;background:var(--c2);border:1px solid var(--bd);text-align:center}
.greek-label{font-size:9px;color:var(--t3)}.greek-val{font-size:12px;font-weight:700}
.predict-box{text-align:center;padding:16px;border-radius:12px;background:rgba(0,229,160,.04);border:1px solid rgba(0,229,160,.15)}
.entry-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:6px}
.mini-chart{padding:10px;border-radius:8px;background:var(--c2);border:1px solid var(--bd)}.mini-chart-label{font-size:9px;color:var(--t3);margin-bottom:6px}
.ai-panel{position:fixed;bottom:0;left:0;right:0;z-index:150;background:rgba(10,15,26,.97);backdrop-filter:blur(12px);border-top:1px solid var(--bd);transform:translateY(calc(100% - 40px));transition:transform .3s}
.ai-panel.open{transform:translateY(0)}
.ai-toggle{height:40px;display:flex;align-items:center;justify-content:center;gap:6px;cursor:pointer;color:var(--pu);font-size:11px;font-weight:600}
.ai-body{padding:12px;max-height:300px;overflow-y:auto}
.ai-result{font-size:11px;line-height:1.7;white-space:pre-wrap}
.ai-loading{text-align:center;color:var(--pu);padding:20px}
.ai-dots span{display:inline-block;width:6px;height:6px;border-radius:50%;background:var(--pu);margin:0 3px;animation:aiDot .8s infinite}
.ai-dots span:nth-child(2){animation-delay:.2s}.ai-dots span:nth-child(3){animation-delay:.4s}
@keyframes aiDot{0%,100%{opacity:.3;transform:scale(.8)}50%{opacity:1;transform:scale(1.2)}}
.footer{padding:6px 12px;background:var(--c1);border-top:1px solid var(--bd);font-size:9px;color:var(--t3);text-align:center}
.empty{padding:60px 20px;text-align:center;color:var(--t3);font-size:12px}.empty-icon{font-size:32px;margin-bottom:8px}
@media(min-width:768px){.cards{display:none}.desk-wrap{display:block}.under-panel{display:block}.chart-section{display:block}.sheet-overlay{display:none!important}}
@media(max-width:767px){.desk-wrap{display:none!important}.under-panel{display:none!important}.chart-section{display:block}.chart-canvas-wrap{height:200px}}
</style>
</head>
<body>
<div class="topbar"><div class="logo"><div class="logo-icon">⬡</div><div><div class="logo-txt">ماسح الأوبشن PRO</div><div class="logo-sub">السوق الأمريكي • بيانات حية</div></div></div><button class="scan-btn" id="scanBtn" onclick="runScan()">⚡ فحص شامل</button></div>

<script>
const STOCKS=[{s:'NVDA',n:'إنفيديا',sec:'أشباه موصلات'},{s:'TSLA',n:'تيسلا',sec:'سيارات'},{s:'AAPL',n:'آبل',sec:'تقنية'},{s:'META',n:'ميتا',sec:'تقنية'},{s:'AMZN',n:'أمازون',sec:'تقنية'},{s:'MSFT',n:'مايكروسوفت',sec:'برمجيات'},{s:'GOOGL',n:'جوجل',sec:'تقنية'},{s:'AMD',n:'إي إم دي',sec:'أشباه موصلات'},{s:'SMCI',n:'سوبر مايكرو',sec:'أشباه موصلات'},{s:'PLTR',n:'بالانتير',sec:'برمجيات'},{s:'COIN',n:'كوين بيس',sec:'كريبتو'},{s:'MSTR',n:'مايكروستراتيجي',sec:'كريبتو'},{s:'SQ',n:'بلوك',sec:'فينتك'},{s:'SOFI',n:'صوفاي',sec:'فينتك'},{s:'ROKU',n:'روكو',sec:'إعلام'},{s:'NFLX',n:'نتفلكس',sec:'إعلام'},{s:'SHOP',n:'شوبيفاي',sec:'تجارة'},{s:'SNOW',n:'سنوفليك',sec:'سحابية'},{s:'CRWD',n:'كراود سترايك',sec:'أمن سيبراني'},{s:'PANW',n:'بالو ألتو',sec:'أمن سيبراني'},{s:'MARA',n:'ماراثون',sec:'كريبتو'},{s:'ARM',n:'آرم',sec:'أشباه موصلات'},{s:'AVGO',n:'برودكوم',sec:'أشباه موصلات'},{s:'MU',n:'ميكرون',sec:'أشباه موصلات'},{s:'CRM',n:'سيلز فورس',sec:'برمجيات'},{s:'UBER',n:'أوبر',sec:'نقل'},{s:'BA',n:'بوينج',sec:'صناعي'},{s:'JPM',n:'جي بي مورجان',sec:'مالي'},{s:'XOM',n:'إكسون',sec:'طاقة'},{s:'SPY',n:'إس بي واي',sec:'صناديق'},{s:'QQQ',n:'كيو كيو كيو',sec:'صناديق'},{s:'IWM',n:'راسل 2000',sec:'صناديق'},{s:'TQQQ',n:'ناسداك 3x',sec:'رافعة'},{s:'SOXL',n:'أشباه 3x',sec:'رافعة'}];
let ST={contracts:[],filter:'all',sort:'score',sector:'الكل',selected:null,sheetTab:'levels',prices:{},loading:false,aiOpen:false,dte:'all',quick:null};
const rnd=(a,b)=>+(Math.random()*(b-a)+a).toFixed(4),rndI=(a,b)=>Math.floor(Math.random()*(b-a+1)+a);

function calcRSI(cl,p=14){if(cl.length<p+1)return 50;let g=0,l=0;for(let i=1;i<=p;i++){const d=cl[i]-cl[i-1];d>0?g+=d:l-=d}let ag=g/p,al=l/p;for(let i=p+1;i<cl.length;i++){const d=cl[i]-cl[i-1];ag=(ag*(p-1)+(d>0?d:0))/p;al=(al*(p-1)+(d<0?-d:0))/p}return al===0?100:+(100-100/(1+ag/al)).toFixed(1)}
function calcEMA(d,p){const k=2/(p+1);let e=d[0];for(let i=1;i<d.length;i++)e=d[i]*k+e*(1-k);return e}
function calcMACD(cl){if(cl.length<26)return{v:0,s:0,h:0};const f=calcEMA(cl,12),s=calcEMA(cl,26),m=f-s;return{v:+m.toFixed(3),s:+calcEMA(cl.slice(-9),9).toFixed(3),h:+(m-calcEMA(cl.slice(-9),9)).toFixed(3)}}
function calcVWAP(c){if(!c.length)return 0;let vp=0,v=0;c.forEach(x=>{vp+=(x.h+x.l+x.c)/3*x.v;v+=x.v});return v?+(vp/v).toFixed(2):0}
function calcBoll(cl,p=20){if(cl.length<p)return{u:0,m:0,l:0};const s=cl.slice(-p),mn=s.reduce((a,b)=>a+b,0)/p,sd=Math.sqrt(s.reduce((a,b)=>a+(b-mn)**2,0)/p);return{u:+(mn+2*sd).toFixed(2),m:+mn.toFixed(2),l:+(mn-2*sd).toFixed(2)}}
function calcATR(c,p=14){if(c.length<p+1)return 0;let s=0;for(let i=c.length-p;i<c.length;i++)s+=Math.max(c[i].h-c[i].l,Math.abs(c[i].h-c[i-1].c),Math.abs(c[i].l-c[i-1].c));return+(s/p).toFixed(3)}
function detectSqueeze(c){if(c.length<20)return{active:false,score:0};const cl=c.map(x=>x.c),b=calcBoll(cl),bw=(b.u-b.l)/b.m;return{active:bw<0.04,score:bw<0.04?Math.min(100,Math.round((0.04-bw)/0.04*100)):0}}
function calcRVI(c,p=10){if(c.length<p+1)return 50;let u=0,d=0;for(let i=c.length-p;i<c.length;i++){const r=c[i].h-c[i].l;c[i].c>c[i].o?u+=r:d+=r}return(u+d)?Math.round(u/(u+d)*100):50}
function detectFractal(c){if(c.length<5)return'محايد';const n=c.length,m=c[n-3];if(m.l<c[n-4].l&&m.l<c[n-2].l&&m.l<c[n-5].l&&m.l<c[n-1].l)return'صعودي';if(m.h>c[n-4].h&&m.h>c[n-2].h&&m.h>c[n-5].h&&m.h>c[n-1].h)return'هبوطي';return'محايد'}
function detectFlow(c){if(c.length<10)return{type:'عادي',score:0};const r=c.slice(-5),p=c.slice(-10,-5),rv=r.reduce((a,x)=>a+x.v,0),pv=p.reduce((a,x)=>a+x.v,0),rt=pv?rv/pv:1,up=r.filter(x=>x.c>x.o).length;if(rt>2.5&&up>=4)return{type:'سويب',score:95};if(rt>2&&up>=3)return{type:'بلوك',score:80};if(rt>1.5)return{type:'تراكم',score:60};return{type:'عادي',score:30}}
function detectVolExp(c){if(c.length<20)return{exploding:false,ratio:1};const avg=c.slice(-20,-1).reduce((a,x)=>a+x.v,0)/19,last=c[c.length-1].v;return{exploding:last/avg>3,ratio:+(last/avg).toFixed(1)}}

function detectFVG(c){if(c.length<3)return{detected:false};const c1=c[c.length-3],c3=c[c.length-1];if(c3.l>c1.h)return{detected:true,type:'صعودية'};if(c3.h<c1.l)return{detected:true,type:'هبوطية'};return{detected:false}}

function calcExplosion(data,c){let s=0;const cl=c.map(x=>x.c),pr=data.price,vw=calcVWAP(c.slice(-20));if(pr>vw)s+=15;const rsi=calcRSI(cl);if(rsi<30)s+=15;else if(rsi>=40&&rsi<=60)s+=10;const mc=calcMACD(cl);if(mc.h>0)s+=15;if(detectSqueeze(c).active)s+=20;const fl=detectFlow(c);if(fl.type==='سويب')s+=15;else if(fl.type==='بلوك')s+=10;if(detectVolExp(c).exploding)s+=10;if(detectFractal(c)==='صعودي')s+=10;if(calcRVI(c)>60)s+=10;if(detectDiv(c)==='صعودي')s+=5;return Math.min(100,s)}

function cleanExpiry(d){const dt=new Date(d),day=dt.getDay();if(day===6)dt.setDate(dt.getDate()-1);if(day===0)dt.setDate(dt.getDate()-2);return dt.toISOString().split('T')[0]}
function isStdStrike(s,p){if(p>200)return s%5===0;if(p>50)return s%1===0;return(s*2)%1===0}

function generateContracts(sd){const contracts=[],now=new Date();STOCKS.forEach(stk=>{const data=sd[stk.s];if(!data||!data.price)return;const pr=data.price,c=data.candles||[],cl=c.map(x=>x.c);const rsi=calcRSI(cl),macd=calcMACD(cl),vwap=calcVWAP(c.slice(-20)),atr=calcATR(c),rvi=calcRVI(c);const squeeze=detectSqueeze(c),fractal=detectFractal(c),flow=detectFlow(c),volExp=detectVolExp(c),div=detectDiv(c),fvg=detectFVG(c);const expScore=calcExplosion(data,c);
const numC=rndI(1,3);for(let i=0;i<numC;i++){const isCall=rsi<50?Math.random()>0.3:Math.random()>0.6;let strike=Math.round((pr+(Math.random()-0.3)*pr*0.08)/0.5)*0.5;if(!isStdStrike(strike,pr))strike=Math.round(strike);

function drawSpark(cv,data,w=120,h=30){if(!data||data.length<2)return;cv.width=w;cv.height=h;const ctx=cv.getContext('2d'),mn=Math.min(...data),mx=Math.max(...data),rg=mx-mn||1,up=data[data.length-1]>data[0],cl=up?'#00e5a0':'#ef4444';ctx.beginPath();data.forEach((v,i)=>{const x=(i/(data.length-1))*w,y=h-((v-mn)/rg)*(h-4)-2;i===0?ctx.moveTo(x,y):ctx.lineTo(x,y)});ctx.strokeStyle=cl;ctx.lineWidth=1.5;ctx.stroke();ctx.lineTo(w,h);ctx.lineTo(0,h);ctx.closePath();const g=ctx.createLinearGradient(0,0,0,h);g.addColorStop(0,up?'rgba(0,229,160,.2)':'rgba(239,68,68,.2)');g.addColorStop(1,'transparent');ctx.fillStyle=g;ctx.fill()}

const vwap=calcVWAP(candles),boll=calcBoll(candles.map(c=>c.c));const mn=Math.min(...candles.map(c=>c.l),boll.l||Infinity)*0.998,mx=Math.max(...candles.map(c=>c.h),boll.u||0)*1.002,rg=mx-mn||1;
const toX=i=>pad.l+(i/(candles.length-1))*cW,toY=v=>pad.t+cH-(v-mn)/rg*cH,cw=Math.max(2,Math.min(8,cW/candles.length-1));

ctx.strokeStyle='rgba(255,255,255,.04)';ctx.lineWidth=0.5;for(let i=0;i<5;i++){const y=pad.t+cH*i/4;ctx.beginPath();ctx.moveTo(pad.l,y);ctx.lineTo(W-pad.r,y);ctx.stroke();ctx.fillStyle='#475569';ctx.font='9px IBM Plex Mono';ctx.textAlign='right';ctx.fillText(fmt(mx-rg*i/4),pad.l-4,y+3)}
if(boll.u>0){ctx.fillStyle='rgba(59,130,246,.04)';ctx.beginPath();candles.forEach((_,i)=>{i===0?ctx.moveTo(toX(i),toY(boll.u)):ctx.lineTo(toX(i),toY(boll.u))});for(let i=candles.length-1;i>=0;i--)ctx.lineTo(toX(i),toY(boll.l));ctx.closePath();ctx.fill()}
if(vwap>0){ctx.strokeStyle='rgba(168,85,247,.5)';ctx.lineWidth=1;ctx.setLineDash([4,4]);ctx.beginPath();candles.forEach((_,i)=>{i===0?ctx.moveTo(toX(i),toY(vwap)):ctx.lineTo(toX(i),toY(vwap))});ctx.stroke();ctx.setLineDash([])}
candles.forEach((c,i)=>{const x=toX(i),up=c.c>=c.o,cl=up?'#00e5a0':'#ef4444';ctx.strokeStyle=cl;ctx.lineWidth=1;ctx.beginPath();ctx.moveTo(x,toY(c.h));ctx.lineTo(x,toY(c.l));ctx.stroke();ctx.fillStyle=up?'rgba(0,229,160,.8)':'rgba(239,68,68,.8)';const yO=toY(c.o),yC=toY(c.c);ctx.fillRect(x-cw/2,Math.min(yO,yC),cw,Math.max(1,Math.abs(yO-yC)))});

ctx.fillStyle='#7a8ba8';ctx.font='10px IBM Plex Sans Arabic';ctx.textAlign='center';ctx.fillText(sym+' — '+candles.length+' شمعة',W/2,H-6);
if(vwap>0){ctx.fillStyle='rgba(168,85,247,.7)';ctx.font='8px IBM Plex Mono';ctx.textAlign='left';ctx.fillText('VWAP '+fmt(vwap),pad.l+4,toY(vwap)-4)}}

function gaugeSVG(v,sz=110,lb='RVI'){const p=Math.min(v/100,1),a=p*180,r=sz*.38,cx=sz/2,cy=sz*.55,sw=sz*.07;const pc=x=>({x:cx+r*Math.cos(Math.PI*(180-x)/180),y:cy-r*Math.sin(Math.PI*(180-x)/180)});const s=pc(0),e=pc(a),bg=pc(180),la=a>180?1:0;const cl=v<25?'#ef4444':v<50?'#f59e0b':v<65?'#eab308':v<80?'#22c55e':'#00e5a0';return'<svg width="'+sz+'" height="'+sz*.62+'" viewBox="0 0 '+sz+' '+sz*.62+'"><defs><filter id="g'+v+sz+'"><feGaussianBlur stdDeviation="2" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter></defs><path d="M '+s.x+' '+s.y+' A '+r+' '+r+' 0 0 1 '+bg.x+' '+bg.y+'" fill="none" stroke="rgba(255,255,255,.06)" stroke-width="'+sw+'" stroke-linecap="round"/>'+(a>0.5?'<path d="M '+s.x+' '+s.y+' A '+r+' '+r+' 0 '+la+' 1 '+e.x+' '+e.y+'" fill="none" stroke="'+cl+'" stroke-width="'+sw+'" stroke-linecap="round" filter="url(#g'+v+sz+')"/>':'')+'<line x1="'+cx+'" y1="'+cy+'" x2="'+e.x+'" y2="'+e.y+'" stroke="'+cl+'" stroke-width="2" stroke-linecap="round" filter="url(#g'+v+sz+')"/><circle cx="'+cx+'" cy="'+cy+'" r="3" fill="'+cl+'"/><text x="'+cx+'" y="'+(cy+sz*.02)+'" text-anchor="middle" fill="'+cl+'" font-size="'+(sz*.15)+'" font-weight="700" font-family="IBM Plex Mono,monospace">'+v+'</text><text x="'+cx+'" y="'+(cy-sz*.2)+'" text-anchor="middle" fill="#475569" font-size="'+(sz*.08)+'" font-family="IBM Plex Mono,monospace">'+lb+'</text></svg>'}

if(c.squeeze.active)bd.push(badge('انضغاط','badge-warn',true,'💥'));if(c.smartMoney)bd.push(badge('سمارت $','badge-gold',false,'💰'));
bd.push(badge('حجم/OI '+c.volOiRatio+'x',c.volOiRatio>1.5?'badge-hot':'badge-muted'));
return'<div class="card tier-'+c.tier+'" onclick="openSheet(\''+c.id+'\')"><div class="card-head"><div class="card-ticker"><div class="card-icon '+(isCall?'call':'put')+'">'+(isCall?'▲C':'▼P')+'</div><div><div class="card-sym">'+medal(c.tier)+' '+c.ticker+'</div><div class="card-detail mono">$'+c.strike+' '+c.typeAr+' · '+(c.expiryDays===0?'0DTE':c.expiryDays+'يوم')+' · '+c.moneyness+'</div></div></div><div class="card-ask"><div class="card-ask-price mono">$'+c.askPrice+'</div><div class="card-ask-label">الطلب</div></div></div><div class="badges">'+bd.join('')+'</div><div class="card-metrics"><div><div class="metric-label">الحجم</div><div class="metric-val mono">'+fmtK(c.volume)+'</div></div><div><div class="metric-label">OI</div><div class="metric-val mono">'+fmtK(c.openInterest)+'</div></div><div><div class="metric-label">IV</div><div class="metric-val mono" style="color:var(--warn)">'+c.iv+'%</div></div><div><div class="metric-label">RSI</div><div class="metric-val mono" style="color:'+(c.rsi<30?'var(--up)':c.rsi>70?'var(--dn)':'var(--warn)')+'">'+c.rsi+'</div></div></div><div class="card-metrics2"><div><div class="metric-label">قيمة الصفقة</div><div class="metric-val mono" style="color:'+(c.isWhale?'var(--gd)':'var(--t2)')+'">'+fmtMoney(c.dealValue)+'</div></div><div><div class="metric-label">العدوانية</div><div class="metric-val" style="color:'+(c.aggression==='ضرب الآسك'?'var(--up)':c.aggression==='ضرب البيد'?'var(--dn)':'var(--t3)')+'">'+c.aggression+'</div></div><div><div class="metric-label">دلتا</div><div class="metric-val mono" style="color:var(--bl)">'+c.delta+'</div></div></div><div class="card-bottom"><canvas class="sparkline" data-sp="'+c.id+'"></canvas><div class="entry-btn '+(atE?'at-entry':'')+'">$'+c.bestEntry+(atE?' ◉':' ←')+'</div></div><div class="exp-bar">'+expBar(c.explosionScore)+'</div></div>'}).join('');
requestAnimationFrame(()=>{cc.forEach(c=>{const cv=document.querySelector('[data-sp="'+c.id+'"]');if(cv)drawSpark(cv,c.sparkline)})})}

function renderDesk(){const cc=getFiltered(),tb=document.getElementById('deskBody');tb.innerHTML=cc.map(c=>{const isCall=c.type==='CALL';const bd=[];
if(c.isWhale)bd.push(badge('🐋','badge-whale'));if(c.isUnusualFlow)bd.push(badge('UF','badge-hot'));if(c.isBounce)bd.push(badge('↩','badge-up'));if(c.squeeze.active)bd.push(badge('SQ','badge-warn'));
return'<tr class="tier-'+c.tier+(ST.selected?.id===c.id?' sel':'')+'" onclick="selectContract(\''+c.id+'\')"><td>'+medal(c.tier)+'</td><td><div style="display:flex;align-items:center;gap:4px"><div class="card-icon '+(isCall?'call':'put')+'" style="width:20px;height:20px;font-size:8px;border-radius:4px">'+(isCall?'▲':'▼')+'</div><div><b>'+c.ticker+'</b><div style="font-size:8px;color:var(--t3)">'+c.name+'</div></div></div></td><td class="mono">$'+c.strike+'</td><td class="mono" style="color:'+(isCall?'var(--up)':'var(--dn)')+'">'+c.typeAr+'</td><td class="mono" style="color:var(--t2)">'+(c.expiryDays===0?'0DTE':c.expiryDays+'d')+'</td><td class="mono">'+fmtK(c.volume)+'</td><td class="mono" style="color:var(--t3)">'+fmtK(c.openInterest)+'</td><td class="mono" style="color:'+(c.volOiRatio>2?'var(--hot)':c.volOiRatio>1?'var(--warn)':'var(--t3)')+';font-weight:700">'+c.volOiRatio+'x</td><td class="mono" style="color:'+(c.isWhale?'var(--gd)':'var(--t2)')+'">'+fmtMoney(c.dealValue)+'</td><td>'+badge(c.aggression,aggrCls(c.aggression))+'</td><td class="mono" style="color:'+(c.rsi<30?'var(--up)':c.rsi>70?'var(--dn)':'var(--t2)')+';font-weight:700">'+c.rsi+'</td><td class="mono">$'+c.askPrice+'</td><td class="mono" style="color:var(--up);font-weight:700">$'+c.bestEntry+'</td><td class="mono" style="color:var(--dn)">$'+c.stopLoss+'</td><td><canvas class="sparkline" data-dsp="'+c.id+'" style="width:60px;height:20px"></canvas></td><td style="width:60px">'+expBar(c.explosionScore)+'</td><td>'+gaugeSVG(c.rvi,40,'')+'</td><td><div style="display:flex;flex-wrap:wrap;gap:2px">'+bd.join('')+'</div></td></tr>'}).join('');
requestAnimationFrame(()=>{cc.forEach(c=>{const cv=document.querySelector('[data-dsp="'+c.id+'"]');if(cv)drawSpark(cv,c.sparkline,60,20)})})}

function renderUnderPanel(){const c=ST.selected,pn=document.getElementById('underPanel');if(!c){pn.innerHTML='';return}
pn.innerHTML='<div class="under-head"><div style="display:flex;align-items:center;gap:10px"><span style="font-size:16px;font-weight:700">'+medal(c.tier)+' '+c.ticker+'</span><span style="font-size:12px;color:var(--t3)">تحليل السهم</span></div><span class="mono" style="font-size:14px;font-weight:700">$'+fmt(c.stockPrice)+'</span></div><div class="under-grid"><div class="under-section"><h4>الدعم والمقاومة</h4>'+[{l:'مقاومة 2',p:c.resistance2,cl:'var(--dn)'},{l:'مقاومة 1',p:c.resistance1,cl:'var(--dn)'},{l:'السعر',p:c.stockPrice,cl:'var(--t1)'},{l:'دعم 1',p:c.support1,cl:'var(--up)'},{l:'دعم 2',p:c.support2,cl:'var(--up)'}].map(lv=>'<div class="level-row"><span class="level-dot" style="background:'+lv.cl+'"></span><span style="font-size:10px;color:'+lv.cl+';min-width:60px">'+lv.l+'</span><div class="level-line" style="border-color:'+lv.cl+'33"></div><span class="mono" style="font-size:11px;font-weight:700;color:'+lv.cl+'">$'+fmt(lv.p)+'</span></div>').join('')+'</div><div class="under-section" style="text-align:center">'+gaugeSVG(c.rvi,130,'RVI')+'<div style="display:flex;gap:4px;justify-content:center;margin-top:6px">'+badge(c.fractal,'badge-'+(c.fractal==='صعودي'?'up':c.fractal==='هبوطي'?'hot':'muted'))+' '+badge(c.vwapAbove?'فوق VWAP':'تحت VWAP','badge-'+(c.vwapAbove?'up':'hot'))+'</div></div><div class="under-section"><h4>الإشارات</h4><div style="display:flex;flex-direction:column;gap:5px"><div style="display:flex;justify-content:space-between"><span style="font-size:10px;color:var(--t3)">العدوانية</span>'+badge(c.aggression,aggrCls(c.aggression))+'</div><div style="display:flex;justify-content:space-between"><span style="font-size:10px;color:var(--t3)">RSI</span><span class="mono" style="color:'+(c.rsi<30?'var(--up)':c.rsi>70?'var(--dn)':'var(--warn)')+'"><b>'+c.rsi+'</b>'+(c.rsi<30?' تشبع بيعي':c.rsi>70?' تشبع شرائي':'')+'</span></div><div style="display:flex;justify-content:space-between"><span style="font-size:10px;color:var(--t3)">قيمة الصفقة</span><span class="mono" style="color:'+(c.isWhale?'var(--gd)':'var(--t2)')+'"><b>'+fmtMoney(c.dealValue)+'</b>'+(c.isWhale?' 🐋':'')+'</span></div><div style="display:flex;justify-content:space-between"><span style="font-size:10px;color:var(--t3)">MACD</span><span class="mono" style="color:'+(c.macd.h>0?'var(--up)':'var(--dn)')+'">'+(c.macd.h>0?'صعودي':'هبوطي')+'</span></div></div></div><div class="under-section"><h4>التوقع</h4><div style="text-align:center;padding:10px;border-radius:8px;background:rgba(0,229,160,.04);border:1px solid rgba(0,229,160,.15)"><div style="font-size:9px;color:var(--t3)">هدف العقد</div><div style="font-size:22px;font-weight:800;color:var(--up)">$'+c.pricePrediction+'</div><div style="font-size:10px;color:var(--up)">+'+(((c.pricePrediction-c.askPrice)/c.askPrice)*100).toFixed(0)+'%</div></div><div style="display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-top:8px"><div style="padding:6px;border-radius:6px;background:rgba(0,229,160,.04);text-align:center"><div style="font-size:9px;color:var(--t3)">هدف 1</div><div class="mono" style="font-size:12px;font-weight:700;color:var(--up)">$'+fmt(c.target1)+'</div></div><div style="padding:6px;border-radius:6px;background:rgba(0,229,160,.04);text-align:center"><div style="font-size:9px;color:var(--t3)">هدف 2</div><div class="mono" style="font-size:12px;font-weight:700;color:var(--up)">$'+fmt(c.target2)+'</div></div></div></div></div>'}

function openSheet(id){const c=ST.contracts.find(x=>x.id===id);if(!c)return;ST.selected=c;ST.sheetTab='levels';document.getElementById('sheetOverlay').classList.add('show');const isCall=c.type==='CALL';
document.getElementById('sheetHeader').innerHTML='<div style="display:flex;align-items:center;gap:10px"><div class="card-icon '+(isCall?'call':'put')+'" style="width:36px;height:36px;font-size:11px">'+(isCall?'▲C':'▼P')+'</div><div><div style="font-weight:700;font-size:13px">'+medal(c.tier)+' '+c.ticker+' — $'+fmt(c.stockPrice)+'</div><div style="font-size:10px;color:var(--t3)">'+c.name+' · '+c.sector+'</div></div></div><button class="sheet-close" onclick="closeSheet()">✕</button>';
document.getElementById('sheetTabs').innerHTML=[{id:'levels',l:'الدعم'},{id:'signals',l:'إشارات'},{id:'predict',l:'توقع'},{id:'chart',l:'شارت'}].map(t=>'<button class="sheet-tab '+(ST.sheetTab===t.id?'on':'')+'" onclick="setSheetTab(\''+t.id+'\')">'+t.l+'</button>').join('');
renderSheetContent();showChartSec(c);let sy=0,dy=0;const sh=document.getElementById('sheet');sh.ontouchstart=e=>{sy=e.touches[0].clientY};sh.ontouchmove=e=>{dy=e.touches[0].clientY-sy;if(dy>0)sh.style.transform='translateY('+dy+'px)'};sh.ontouchend=()=>{if(dy>120)closeSheet();else{sh.style.transform='';dy=0}}}
function closeSheet(){document.getElementById('sheetOverlay').classList.remove('show');document.getElementById('sheet').style.transform=''}
function setSheetTab(t){ST.sheetTab=t;document.querySelectorAll('.sheet-tab').forEach((b,i)=>b.classList.toggle('on',['levels','signals','predict','chart'][i]===t));renderSheetContent()}

function renderSheetContent(){const c=ST.selected;if(!c)return;const el=document.getElementById('sheetContent');
if(ST.sheetTab==='levels'){el.innerHTML='<div style="font-size:10px;font-weight:600;color:var(--t3);margin-bottom:10px">الدعم والمقاومة</div>'+[{l:'مقاومة 2',p:c.resistance2,cl:'var(--dn)'},{l:'مقاومة 1',p:c.resistance1,cl:'var(--dn)'},{l:'السعر',p:c.stockPrice,cl:'var(--t1)'},{l:'دعم 1',p:c.support1,cl:'var(--up)'},{l:'دعم 2',p:c.support2,cl:'var(--up)'}].map(lv=>'<div class="level-row"><span class="level-dot" style="background:'+lv.cl+'"></span><span style="font-size:10px;color:'+lv.cl+';min-width:80px">'+lv.l+'</span><div class="level-line" style="border-color:'+lv.cl+'33"></div><span class="mono" style="font-size:11px;font-weight:700;color:'+lv.cl+'">$'+fmt(lv.p)+'</span></div>').join('')+'<div class="target-grid"><div style="padding:10px;border-radius:8px;background:rgba(0,229,160,.04);border:1px solid rgba(0,229,160,.15);text-align:center"><div style="font-size:9px;color:var(--t3)">هدف 1</div><div class="mono" style="font-size:18px;font-weight:800;color:var(--up)">$'+fmt(c.target1)+'</div></div><div style="padding:10px;border-radius:8px;background:rgba(0,229,160,.04);border:1px solid rgba(0,229,160,.15);text-align:center"><div style="font-size:9px;color:var(--t3)">هدف 2</div><div class="mono" style="font-size:18px;font-weight:800;color:var(--up)">$'+fmt(c.target2)+'</div></div></div>'}
else if(ST.sheetTab==='signals'){el.innerHTML='<div style="display:flex;justify-content:center">'+gaugeSVG(c.rvi,140,'RVI')+'</div><div class="sig-grid"><div class="sig-box"><div class="sig-box-label">العدوانية</div>'+badge(c.aggression,aggrCls(c.aggression),false,c.aggression==='ضرب الآسك'?'⚔':'')+'</div><div class="sig-box"><div class="sig-box-label">RSI</div><span class="mono" style="font-size:14px;font-weight:700;color:'+(c.rsi<30?'var(--up)':c.rsi>70?'var(--dn)':'var(--warn)')+'">'+c.rsi+(c.isBounce?' 🎯':'')+'</span></div><div class="sig-box"><div class="sig-box-label">الفركتال</div>'+badge(c.fractal,'badge-'+(c.fractal==='صعودي'?'up':'muted'))+'</div><div class="sig-box"><div class="sig-box-label">الانضغاط</div>'+badge(c.squeeze.active?'نشط':'لا','badge-'+(c.squeeze.active?'warn':'muted'),c.squeeze.active)+'</div><div class="sig-box"><div class="sig-box-label">VWAP</div>'+badge(c.vwapAbove?'فوق':'تحت','badge-'+(c.vwapAbove?'up':'hot'))+'</div><div class="sig-box"><div class="sig-box-label">التدفق</div>'+badge(c.flow.type,'badge-'+(c.flow.type==='سويب'?'hot':'warn'))+'</div><div class="sig-box"><div class="sig-box-label">قيمة الصفقة</div><span class="mono" style="font-size:12px;font-weight:700;color:'+(c.isWhale?'var(--gd)':'var(--t2)')+'">'+fmtMoney(c.dealValue)+(c.isWhale?' 🐋':'')+'</span></div><div class="sig-box"><div class="sig-box-label">MACD</div>'+badge(c.macd.h>0?'صعودي':'هبوطي','badge-'+(c.macd.h>0?'up':'hot'))+'</div></div><div style="margin-top:10px;padding:10px;border-radius:8px;background:var(--c2);border:1px solid var(--bd)"><div style="font-size:9px;color:var(--t3);margin-bottom:6px">نقاط الانفجار</div>'+expBar(c.explosionScore)+'</div>'}
else if(ST.sheetTab==='predict'){el.innerHTML='<div class="predict-box"><div style="font-size:10px;color:var(--t3)">هدف العقد</div><div class="predict-price" style="font-size:28px;font-weight:800;color:var(--up)">$'+c.pricePrediction+'</div><div style="font-size:11px;color:var(--up)">+'+(((c.pricePrediction-c.askPrice)/c.askPrice)*100).toFixed(0)+'%</div></div><div style="font-size:10px;font-weight:600;color:var(--t3);margin:12px 0 6px">اليونانيات</div><div class="greeks-grid"><div class="greek-box"><div class="greek-label">دلتا</div><div class="greek-val mono" style="color:var(--bl)">'+c.delta+'</div></div><div class="greek-box"><div class="greek-label">جاما</div><div class="greek-val mono" style="color:var(--pu)">'+c.gamma+'</div></div><div class="greek-box"><div class="greek-label">ثيتا</div><div class="greek-val mono" style="color:var(--dn)">'+c.theta+'</div></div></div><div class="entry-grid" style="margin-top:10px"><div style="padding:6px;border-radius:6px;background:rgba(0,229,160,.04);border:1px solid rgba(0,229,160,.15);text-align:center"><div style="font-size:9px;color:var(--t3)">دخول</div><div class="mono" style="font-size:13px;font-weight:700;color:var(--up)">$'+c.bestEntry+'</div></div><div style="padding:6px;border-radius:6px;background:rgba(239,68,68,.04);border:1px solid rgba(239,68,68,.15);text-align:center"><div style="font-size:9px;color:var(--t3)">وقف</div><div class="mono" style="font-size:13px;font-weight:700;color:var(--dn)">$'+c.stopLoss+'</div></div><div style="padding:6px;border-radius:6px;background:rgba(245,158,11,.04);border:1px solid rgba(245,158,11,.15);text-align:center"><div style="font-size:9px;color:var(--t3)">IV</div><div class="mono" style="font-size:13px;font-weight:700;color:var(--warn)">'+c.iv+'%</div></div></div>'}
else if(ST.sheetTab==='chart'){el.innerHTML='<div class="mini-chart"><div class="mini-chart-label">'+c.ticker+' — شارت شمعي</div><canvas id="sheetCV" style="width:100%;height:180px"></canvas></div>';requestAnimationFrame(()=>{const cv=document.getElementById('sheetCV');if(cv&&c.candlesRaw){cv.width=cv.offsetWidth;cv.height=180;drawChart(c.candlesRaw.slice(-50),c.ticker)}})}}

function selectContract(id){const c=ST.contracts.find(x=>x.id===id);if(c){ST.selected=c;renderDesk();renderUnderPanel();showChartSec(c)}}
function showChartSec(c){if(!c||!c.candlesRaw)return;document.getElementById('chartSection').style.display='block';document.getElementById('chartTitle').textContent=medal(c.tier)+' '+c.ticker+' — $'+fmt(c.stockPrice);drawChart(c.candlesRaw.slice(-60),c.ticker)}

function toggleAI(){ST.aiOpen=!ST.aiOpen;document.getElementById('aiPanel').classList.toggle('open',ST.aiOpen);if(ST.aiOpen&&ST.selected)runAI()}
async function runAI(){const c=ST.selected;if(!c){document.getElementById('aiBody').innerHTML='<div style="text-align:center;color:var(--t3);padding:20px">اختر عقداً</div>';return}
document.getElementById('aiBody').innerHTML='<div class="ai-loading">✦ جاري التحليل...<div class="ai-dots"><span></span><span></span><span></span></div></div>';
const prompt='أنت محلل أوبشن خبير. حلل باختصار:\nسهم: '+c.ticker+' ($'+c.stockPrice+') RSI:'+c.rsi+'\nعقد: '+c.type+' $'+c.strike+' انتهاء '+c.expiry+'\nسعر: $'+c.askPrice+' IV:'+c.iv+'% دلتا:'+c.delta+'\nحجم:'+c.volume+' OI:'+c.openInterest+' نسبة:'+c.volOiRatio+'x\nقيمة: '+fmtMoney(c.dealValue)+' عدوانية: '+c.aggression+'\nانفجار:'+c.explosionScore+'% RVI:'+c.rvi+' MACD:'+(c.macd.h>0?'صعودي':'هبوطي')+'\n'+(c.isWhale?'حيتان ':'')+' '+(c.isBounce?'فرصة ارتداد ':'')+' '+(c.isUnusualFlow?'غير عادي ':'')+'\nالمطلوب: 1)تقييم 2)دخول وهدف ووقف 3)مخاطر. بالعربية بإيجاز.';
try{const r=await fetch('/api/ai',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({prompt})});const d=await r.json();const txt=d.content?.[0]?.text||'تعذر';document.getElementById('aiBody').innerHTML='<div class="ai-result">'+txt.replace(/\*\*(.*?)\*\*/g,'<b>$1</b>').replace(/\n/g,'<br>')+'</div>'}catch(e){document.getElementById('aiBody').innerHTML='<div style="color:var(--dn);text-align:center;padding:20px">خطأ</div>'}}

function renderAll(){renderStats();renderCards();renderDesk();renderUnderPanel();const cc=getFiltered();document.getElementById('footer').textContent=cc.length+' عقد · '+cc.filter(c=>c.qualifies).length+' مؤهل · '+cc.filter(c=>c.isWhale).length+' حوت · '+ST.sort+' · '+ST.dte}

async function runScan(){if(ST.loading)return;ST.loading=true;const btn=document.getElementById('scanBtn');btn.classList.add('scanning');btn.textContent='⟳ فحص...';document.getElementById('cardsList').innerHTML='<div class="empty"><div class="empty-icon">⚡</div>جاري فحص السوق...</div>';
const sd={};for(let i=0;i<STOCKS.length;i+=3){const batch=STOCKS.slice(i,i+3);const results=await Promise.allSettled(batch.map(s=>fetchStock(s.s)));results.forEach((r,idx)=>{if(r.status==='fulfilled'&&r.value)sd[batch[idx].s]=r.value});document.getElementById('footer').textContent='جلب... '+Math.min(i+3,STOCKS.length)+'/'+STOCKS.length}
ST.prices=sd;ST.contracts=generateContracts(sd);renderAll();renderSectors();ST.loading=false;btn.classList.remove('scanning');btn.textContent='⚡ فحص شامل'}

document.getElementById('filterBar').addEventListener('click',e=>{const b=e.target.closest('[data-f]');if(b)setFilter(b.dataset.f);const s=e.target.closest('[data-s]');if(s)setSort(s.dataset.s)});
document.getElementById('sheetOverlay').addEventListener('click',e=>{if(e.target===e.currentTarget)closeSheet()});
renderSectors();renderStats();document.getElementById('cardsList').innerHTML='<div class="empty"><div class="empty-icon">⚡</div>اضغط "فحص شامل"</div>';setTimeout(runScan,500);
</script>
</body>
</html>
