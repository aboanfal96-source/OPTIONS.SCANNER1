<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=5.0">
<title>ماسح الأوبشن الأمريكي PRO</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@400;500;600;700;800&family=IBM+Plex+Mono:wght@400;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --c0:#060a13;--c1:#0a0f1a;--c2:#0e1525;--c3:#131c2e;--c4:#1a2540;
  --bd:rgba(255,255,255,.06);--bd2:rgba(255,255,255,.12);
  --t1:#e2e8f0;--t2:#7a8ba8;--t3:#475569;
  --up:#00e5a0;--dn:#ef4444;--ubg:rgba(0,229,160,.08);--dbg:rgba(239,68,68,.08);
  --bl:#3b82f6;--bl2:rgba(59,130,246,.12);
  --gd:#fbbf24;--pu:#a855f7;--cy:#22d3ee;--hot:#ff6b35;
  --warn:#f59e0b;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;background:var(--c0);color:var(--t1);font-family:'IBM Plex Sans Arabic',sans-serif;font-size:12px;overflow-x:hidden}
.mono{font-family:'IBM Plex Mono',monospace}

/* ═══ شريط علوي ═══ */
.topbar{position:sticky;top:0;z-index:100;background:var(--c1);border-bottom:1px solid var(--bd);padding:8px 12px;display:flex;align-items:center;justify-content:space-between;gap:8px}
.logo{display:flex;align-items:center;gap:8px}
.logo-icon{width:32px;height:32px;background:linear-gradient(135deg,var(--up),var(--bl));border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:800;color:#fff}
.logo-txt{font-size:11px;font-weight:700;color:var(--up);letter-spacing:1.5px}
.logo-sub{font-size:9px;color:var(--t3)}
.scan-btn{padding:7px 16px;border:1px solid rgba(0,229,160,.3);background:rgba(0,229,160,.08);color:var(--up);border-radius:8px;font-size:11px;font-weight:700;cursor:pointer;transition:all .2s;font-family:inherit;position:relative;overflow:hidden}
.scan-btn:hover{background:rgba(0,229,160,.15);transform:scale(1.02)}
.scan-btn.scanning{color:var(--t3);border-color:var(--bd)}
.scan-btn.scanning::after{content:'';position:absolute;top:0;left:0;right:0;bottom:0;background:linear-gradient(90deg,transparent,rgba(0,229,160,.1),transparent);animation:scanLine 1.5s infinite}
@keyframes scanLine{0%{transform:translateX(-100%)}100%{transform:translateX(100%)}}

/* ═══ إحصائيات ═══ */
.stats-bar{display:flex;gap:6px;padding:8px 12px;overflow-x:auto;background:var(--c1);border-bottom:1px solid var(--bd)}
.stats-bar::-webkit-scrollbar{display:none}
.stat-chip{flex-shrink:0;display:flex;align-items:center;gap:6px;padding:5px 10px;border-radius:8px;border:1px solid var(--bd);background:var(--c2)}
.stat-icon{font-size:11px}
.stat-label{font-size:9px;color:var(--t3)}
.stat-val{font-size:12px;font-weight:700}

/* ═══ فلاتر ═══ */
.filter-bar{display:flex;gap:4px;padding:6px 12px;overflow-x:auto;background:var(--c1);border-bottom:1px solid var(--bd)}
.filter-bar::-webkit-scrollbar{display:none}
.fbtn{flex-shrink:0;padding:5px 12px;border-radius:6px;border:1px solid var(--bd);background:transparent;color:var(--t3);font-size:10px;font-weight:600;cursor:pointer;transition:all .15s;font-family:inherit}
.fbtn.on{background:rgba(0,229,160,.1);color:var(--up);border-color:rgba(0,229,160,.3)}
.fbtn.blue{background:var(--bl2);color:var(--bl);border-color:rgba(59,130,246,.3)}
.fbtn:hover{border-color:var(--bd2)}
.sep{width:1px;background:var(--bd);margin:0 2px;flex-shrink:0}

/* ═══ قطاعات ═══ */
.sector-bar{display:flex;gap:3px;padding:4px 12px;overflow-x:auto;background:var(--c0);border-bottom:1px solid var(--bd)}
.sector-bar::-webkit-scrollbar{display:none}
.sbtn{flex-shrink:0;padding:3px 8px;border-radius:4px;border:none;background:transparent;color:var(--t3);font-size:9px;cursor:pointer;transition:all .15s;font-family:inherit}
.sbtn.on{background:rgba(168,85,247,.1);color:var(--pu)}

/* ═══ بطاقات الجوال ═══ */
.cards{padding:8px;display:flex;flex-direction:column;gap:8px}
.card{background:var(--c2);border:1px solid var(--bd);border-radius:12px;overflow:hidden;cursor:pointer;transition:all .2s;-webkit-tap-highlight-color:transparent}
.card:active{transform:scale(.98)}
.card.hot{box-shadow:0 0 20px rgba(0,229,160,.08)}
.card-head{padding:10px 12px 6px;display:flex;align-items:flex-start;justify-content:space-between}
.card-ticker{display:flex;align-items:center;gap:8px}
.card-icon{width:36px;height:36px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:800}
.card-icon.call{background:rgba(0,229,160,.1);color:var(--up);border:1px solid rgba(0,229,160,.2)}
.card-icon.put{background:rgba(239,68,68,.1);color:var(--dn);border:1px solid rgba(239,68,68,.2)}
.card-sym{font-size:13px;font-weight:700}
.card-detail{font-size:10px;color:var(--t3)}
.card-ask{text-align:left}
.card-ask-price{font-size:14px;font-weight:700}
.card-ask-label{font-size:9px;color:var(--t3)}

/* شارات */
.badges{padding:2px 12px 6px;display:flex;flex-wrap:wrap;gap:4px}
.badge{display:inline-flex;align-items:center;gap:3px;padding:2px 6px;border-radius:4px;font-size:9px;font-weight:600}
.badge-up{background:rgba(0,229,160,.1);color:var(--up);border:1px solid rgba(0,229,160,.2)}
.badge-hot{background:rgba(255,107,53,.1);color:var(--hot);border:1px solid rgba(255,107,53,.2)}
.badge-gold{background:rgba(251,191,36,.1);color:var(--gd);border:1px solid rgba(251,191,36,.2)}
.badge-pu{background:rgba(168,85,247,.1);color:var(--pu);border:1px solid rgba(168,85,247,.2)}
.badge-warn{background:rgba(245,158,11,.1);color:var(--warn);border:1px solid rgba(245,158,11,.2)}
.badge-muted{background:rgba(71,85,105,.1);color:var(--t3);border:1px solid rgba(71,85,105,.2)}
.badge.pulse{animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}

/* مقاييس */
.card-metrics{padding:2px 12px 6px;display:grid;grid-template-columns:repeat(4,1fr);gap:6px}
.metric-label{font-size:9px;color:var(--t3)}
.metric-val{font-size:11px;font-weight:700}

/* شارت مصغر + دخول */
.card-bottom{padding:4px 12px 8px;display:flex;align-items:flex-end;justify-content:space-between}
.sparkline{width:120px;height:30px}
.entry-btn{display:inline-flex;align-items:center;gap:4px;padding:4px 10px;border-radius:6px;font-size:10px;font-weight:700;border:1px solid rgba(0,229,160,.2);background:rgba(0,229,160,.06);color:var(--up)}
.entry-btn.at-entry{animation:pulse 1.5s infinite;border-color:var(--up);background:rgba(0,229,160,.15);box-shadow:0 0 12px rgba(0,229,160,.3)}

/* شريط الانفجار */
.exp-bar{padding:4px 12px 10px}
.exp-track{height:4px;border-radius:4px;background:var(--c4);overflow:hidden;position:relative}
.exp-fill{height:100%;border-radius:4px;transition:width .7s}
.exp-row{display:flex;align-items:center;gap:6px}
.exp-pct{font-size:10px;font-weight:700;min-width:30px;text-align:left}

/* ═══ جدول سطح المكتب ═══ */
.desk-table{display:none;margin:8px;border-radius:12px;overflow:hidden;border:1px solid var(--bd)}
.desk-table table{width:100%;border-collapse:collapse}
.desk-table th{padding:8px 10px;font-size:10px;font-weight:600;color:var(--t3);text-align:right;background:var(--c2);border-bottom:1px solid var(--bd);text-transform:uppercase;letter-spacing:.5px;white-space:nowrap}
.desk-table td{padding:6px 10px;font-size:11px;border-bottom:1px solid var(--bd);white-space:nowrap}
.desk-table tr{cursor:pointer;transition:background .15s}
.desk-table tr:hover{background:var(--c3)}
.desk-table tr.sel{background:rgba(0,229,160,.04)}

/* ═══ لوحة السهم الأساسي (سطح المكتب) ═══ */
.under-panel{display:none;margin:0 8px 8px;border-radius:12px;border:1px solid var(--bd);background:var(--c2);overflow:hidden}
.under-head{padding:12px 16px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--bd)}
.under-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;padding:16px}
.under-section h4{font-size:10px;font-weight:600;color:var(--t3);text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px}

/* ═══ البوتم شيت (الجوال) ═══ */
.sheet-overlay{position:fixed;inset:0;z-index:200;background:rgba(0,0,0,.6);backdrop-filter:blur(4px);display:none;flex-direction:column;justify-content:flex-end}
.sheet-overlay.show{display:flex}
.sheet{background:var(--c1);border-radius:16px 16px 0 0;max-height:70vh;overflow:hidden;border-top:1px solid var(--bd2);transform:translateY(0);transition:transform .3s}
.sheet-handle{display:flex;justify-content:center;padding:8px 0 4px}
.sheet-handle div{width:36px;height:3px;border-radius:3px;background:var(--t3)}
.sheet-header{padding:8px 16px 10px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--bd)}
.sheet-close{width:28px;height:28px;border-radius:50%;background:var(--c4);border:none;color:var(--t2);font-size:14px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.sheet-tabs{display:flex;padding:8px 16px 0;gap:4px}
.sheet-tab{flex:1;padding:8px;border-radius:8px;border:1px solid var(--bd);background:transparent;color:var(--t3);font-size:10px;font-weight:600;cursor:pointer;font-family:inherit;transition:all .15s}
.sheet-tab.on{background:rgba(0,229,160,.08);color:var(--up);border-color:rgba(0,229,160,.2)}
.sheet-content{padding:16px;overflow-y:auto;max-height:45vh}

/* مستويات */
.level-row{display:flex;align-items:center;justify-content:space-between;padding:6px 0}
.level-dot{width:6px;height:6px;border-radius:50%}
.level-line{flex:1;margin:0 8px;border-bottom:1px dashed var(--bd)}
.level-label{font-size:10px;min-width:80px}
.level-price{font-size:11px;font-weight:700}

/* أهداف */
.target-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:10px}
.target-box{padding:10px;border-radius:8px;text-align:center}
.target-label{font-size:9px;color:var(--t3)}
.target-price{font-size:18px;font-weight:800}
.target-pct{font-size:10px}

/* شبكة إشارات */
.sig-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px}
.sig-box{padding:8px;border-radius:8px;background:var(--c2);border:1px solid var(--bd)}
.sig-box-label{font-size:9px;color:var(--t3);margin-bottom:4px}

/* عداد السرعة RVI */
.gauge-wrap{display:flex;justify-content:center;margin:8px 0}

/* يونانيات */
.greeks-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:6px}
.greek-box{padding:6px;border-radius:6px;background:var(--c2);border:1px solid var(--bd);text-align:center}
.greek-label{font-size:9px;color:var(--t3)}
.greek-val{font-size:12px;font-weight:700}

/* توقع */
.predict-box{text-align:center;padding:16px;border-radius:12px;background:rgba(0,229,160,.04);border:1px solid rgba(0,229,160,.15)}
.predict-label{font-size:10px;color:var(--t3)}
.predict-price{font-size:28px;font-weight:800;color:var(--up)}
.predict-pct{font-size:11px;color:var(--up)}

/* دخول/وقف */
.entry-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:6px}
.entry-box{padding:6px;border-radius:6px;text-align:center}

/* شارت 15 دقيقة */
.mini-chart{padding:10px;border-radius:8px;background:var(--c2);border:1px solid var(--bd)}
.mini-chart-label{font-size:9px;color:var(--t3);margin-bottom:6px}
.mini-chart canvas{width:100%;height:50px}

/* ═══ ذكاء اصطناعي ═══ */
.ai-panel{position:fixed;bottom:0;left:0;right:0;z-index:150;background:var(--c1);border-top:1px solid var(--bd);transform:translateY(calc(100% - 40px));transition:transform .3s}
.ai-panel.open{transform:translateY(0)}
.ai-toggle{height:40px;display:flex;align-items:center;justify-content:center;gap:6px;cursor:pointer;color:var(--pu);font-size:11px;font-weight:600}
.ai-body{padding:12px;max-height:300px;overflow-y:auto}
.ai-result{font-size:11px;line-height:1.7;color:var(--t1);white-space:pre-wrap}
.ai-loading{text-align:center;color:var(--pu);padding:20px}
.ai-dots span{display:inline-block;width:6px;height:6px;border-radius:50%;background:var(--pu);margin:0 3px;animation:aiDot .8s infinite}
.ai-dots span:nth-child(2){animation-delay:.2s}
.ai-dots span:nth-child(3){animation-delay:.4s}
@keyframes aiDot{0%,100%{opacity:.3;transform:scale(.8)}50%{opacity:1;transform:scale(1.2)}}

/* ═══ شريط سفلي ═══ */
.footer{position:sticky;bottom:0;padding:6px 12px;background:var(--c1);border-top:1px solid var(--bd);font-size:9px;color:var(--t3);text-align:center;z-index:50}

/* ═══ فارغ ═══ */
.empty{padding:60px 20px;text-align:center;color:var(--t3);font-size:12px}
.empty-icon{font-size:32px;margin-bottom:8px}

/* ═══ ريسبونسيف ═══ */
@media(min-width:768px){
  .cards{display:none}
  .desk-table{display:block}
  .under-panel{display:block}
  .sheet-overlay{display:none!important}
}
@media(max-width:767px){
  .desk-table{display:none!important}
  .under-panel{display:none!important}
}
</style>
</head>
<body>

<!-- ═══════ الشريط العلوي ═══════ -->
<div class="topbar">
  <div class="logo">
    <div class="logo-icon">⬡</div>
    <div>
      <div class="logo-txt">ماسح الأوبشن PRO</div>
      <div class="logo-sub">السوق الأمريكي • بيانات حية</div>
    </div>
  </div>
  <button class="scan-btn" id="scanBtn" onclick="runScan()">⚡ فحص شامل</button>
</div>

<!-- ═══════ إحصائيات ═══════ -->
<div class="stats-bar" id="statsBar"></div>

<!-- ═══════ فلاتر ═══════ -->
<div class="filter-bar" id="filterBar">
  <button class="fbtn on" data-f="all">الكل</button>
  <button class="fbtn" data-f="qualified">✦ مؤهلة</button>
  <button class="fbtn" data-f="calls">▲ شراء</button>
  <button class="fbtn" data-f="puts">▼ بيع</button>
  <div class="sep"></div>
  <button class="fbtn blue" data-s="score">الانفجار</button>
  <button class="fbtn" data-s="volume">الحجم</button>
  <button class="fbtn" data-s="voloi">حجم/OI</button>
  <button class="fbtn" data-s="rvi">RVI</button>
  <button class="fbtn" data-s="sweep">السويب</button>
  <button class="fbtn" data-s="money">سمارت $</button>
</div>

<!-- ═══════ قطاعات ═══════ -->
<div class="sector-bar" id="sectorBar"></div>

<!-- ═══════ بطاقات الجوال ═══════ -->
<div class="cards" id="cardsList"></div>

<!-- ═══════ جدول سطح المكتب ═══════ -->
<div class="desk-table" id="deskTable">
  <table>
    <thead><tr>
      <th>السهم</th><th>سترايك</th><th>النوع</th><th>الانتهاء</th>
      <th>الحجم</th><th>OI</th><th>حجم/OI</th><th>الطلب</th>
      <th>أفضل دخول</th><th>وقف</th><th>15 دقيقة</th>
      <th>الانفجار</th><th>RVI</th><th>الإشارات</th>
    </tr></thead>
    <tbody id="deskBody"></tbody>
  </table>
</div>

<!-- ═══════ لوحة السهم الأساسي ═══════ -->
<div class="under-panel" id="underPanel"></div>

<!-- ═══════ البوتم شيت ═══════ -->
<div class="sheet-overlay" id="sheetOverlay">
  <div class="sheet" id="sheet">
    <div class="sheet-handle"><div></div></div>
    <div class="sheet-header" id="sheetHeader"></div>
    <div class="sheet-tabs" id="sheetTabs"></div>
    <div class="sheet-content" id="sheetContent"></div>
  </div>
</div>

<!-- ═══════ لوحة الذكاء الاصطناعي ═══════ -->
<div class="ai-panel" id="aiPanel">
  <div class="ai-toggle" onclick="toggleAI()">✦ تحليل ذكي بالذكاء الاصطناعي ▲</div>
  <div class="ai-body" id="aiBody">
    <div style="text-align:center;color:var(--t3);padding:20px">اختر عقداً ثم اضغط هنا للتحليل الذكي</div>
  </div>
</div>

<!-- ═══════ شريط سفلي ═══════ -->
<div class="footer" id="footer">جاري التحميل...</div>

<script>
// ═══════════════════════════════════════════════════════════════
// قاعدة البيانات — أسهم أمريكية مع القطاعات
// ═══════════════════════════════════════════════════════════════
const STOCKS = [
  {s:'NVDA',n:'إنفيديا',sec:'أشباه موصلات'},
  {s:'TSLA',n:'تيسلا',sec:'سيارات كهربائية'},
  {s:'AAPL',n:'آبل',sec:'تقنية'},
  {s:'META',n:'ميتا',sec:'تقنية'},
  {s:'AMZN',n:'أمازون',sec:'تقنية'},
  {s:'MSFT',n:'مايكروسوفت',sec:'برمجيات'},
  {s:'GOOGL',n:'جوجل',sec:'تقنية'},
  {s:'AMD',n:'إي إم دي',sec:'أشباه موصلات'},
  {s:'SMCI',n:'سوبر مايكرو',sec:'أشباه موصلات'},
  {s:'PLTR',n:'بالانتير',sec:'برمجيات'},
  {s:'COIN',n:'كوين بيس',sec:'كريبتو'},
  {s:'MSTR',n:'مايكروستراتيجي',sec:'كريبتو'},
  {s:'SQ',n:'بلوك',sec:'فينتك'},
  {s:'SOFI',n:'صوفاي',sec:'فينتك'},
  {s:'ROKU',n:'روكو',sec:'إعلام'},
  {s:'NFLX',n:'نتفلكس',sec:'إعلام'},
  {s:'SHOP',n:'شوبيفاي',sec:'تجارة إلكترونية'},
  {s:'SNOW',n:'سنوفليك',sec:'سحابية'},
  {s:'CRWD',n:'كراود سترايك',sec:'أمن سيبراني'},
  {s:'PANW',n:'بالو ألتو',sec:'أمن سيبراني'},
  {s:'MARA',n:'ماراثون',sec:'كريبتو'},
  {s:'RIOT',n:'رايوت',sec:'كريبتو'},
  {s:'ARM',n:'آرم',sec:'أشباه موصلات'},
  {s:'AVGO',n:'برودكوم',sec:'أشباه موصلات'},
  {s:'MU',n:'ميكرون',sec:'أشباه موصلات'},
  {s:'CRM',n:'سيلز فورس',sec:'برمجيات'},
  {s:'UBER',n:'أوبر',sec:'نقل'},
  {s:'BA',n:'بوينج',sec:'صناعي'},
  {s:'JPM',n:'جي بي مورجان',sec:'مالي'},
  {s:'XOM',n:'إكسون',sec:'طاقة'},
  {s:'SPY',n:'إس بي واي',sec:'صناديق'},
  {s:'QQQ',n:'كيو كيو كيو',sec:'صناديق'},
  {s:'IWM',n:'راسل 2000',sec:'صناديق'},
  {s:'TQQQ',n:'ناسداك 3x',sec:'صناديق رافعة'},
  {s:'SOXL',n:'أشباه موصلات 3x',sec:'صناديق رافعة'},
];

// ═══════════════════════════════════════════════════════════════
// الحالة العامة
// ═══════════════════════════════════════════════════════════════
let STATE = {
  contracts: [],
  filter: 'all',
  sort: 'score',
  sector: 'الكل',
  selected: null,
  sheetTab: 'levels',
  prices: {},     // أسعار حقيقية من Yahoo
  candles: {},    // شموع حقيقية
  loading: false,
  aiOpen: false,
};

// ═══════════════════════════════════════════════════════════════
// أدوات مساعدة
// ═══════════════════════════════════════════════════════════════
const rnd = (a,b) => +(Math.random()*(b-a)+a).toFixed(4);
const rndI = (a,b) => Math.floor(Math.random()*(b-a+1)+a);
const fmt = (n,d=2) => n==null?'—':Number(n).toFixed(d);
const fmtK = n => n>=1000?(n/1000).toFixed(1)+'K':n;

// ═══════════════════════════════════════════════════════════════
// جلب البيانات الحقيقية من Yahoo Finance
// ═══════════════════════════════════════════════════════════════
async function fetchStockData(symbol) {
  try {
    const r = await fetch(`/api/stock?symbol=${symbol}&range=5d&interval=15m`);
    if (!r.ok) throw new Error('API error');
    const data = await r.json();
    const result = data?.chart?.result?.[0];
    if (!result) return null;

    const q = result.meta;
    const ts = result.timestamp || [];
    const ohlc = result.indicators?.quote?.[0] || {};

    const candles = ts.map((t,i) => ({
      t: t*1000,
      o: ohlc.open?.[i],
      h: ohlc.high?.[i],
      l: ohlc.low?.[i],
      c: ohlc.close?.[i],
      v: ohlc.volume?.[i] || 0,
    })).filter(c => c.c != null);

    return {
      price: q.regularMarketPrice || candles[candles.length-1]?.c || 0,
      prevClose: q.previousClose || q.chartPreviousClose || 0,
      change: (q.regularMarketPrice||0) - (q.previousClose||0),
      changePct: (((q.regularMarketPrice||0) - (q.previousClose||0)) / (q.previousClose||1)) * 100,
      volume: candles.reduce((a,c)=>a+c.v, 0),
      candles: candles,
      high52: q.fiftyTwoWeekHigh || 0,
      low52: q.fiftyTwoWeekLow || 0,
    };
  } catch(e) {
    console.warn('فشل جلب', symbol, e);
    return null;
  }
}

// ═══════════════════════════════════════════════════════════════
// حسابات المؤشرات الفنية الحقيقية
// ═══════════════════════════════════════════════════════════════
function calcRSI(closes, period=14) {
  if (closes.length < period+1) return 50;
  let gains=0, losses=0;
  for (let i=1; i<=period; i++) {
    const d = closes[i]-closes[i-1];
    if (d>0) gains+=d; else losses-=d;
  }
  let avgGain=gains/period, avgLoss=losses/period;
  for (let i=period+1; i<closes.length; i++) {
    const d=closes[i]-closes[i-1];
    avgGain=(avgGain*(period-1)+(d>0?d:0))/period;
    avgLoss=(avgLoss*(period-1)+(d<0?-d:0))/period;
  }
  if (avgLoss===0) return 100;
  return +(100 - 100/(1+avgGain/avgLoss)).toFixed(1);
}

function calcEMA(data, period) {
  const k = 2/(period+1);
  let ema = data[0];
  for (let i=1; i<data.length; i++) ema = data[i]*k + ema*(1-k);
  return ema;
}

function calcMACD(closes) {
  if (closes.length < 26) return {v:0,s:0,h:0};
  const fast = calcEMA(closes, 12);
  const slow = calcEMA(closes, 26);
  const macd = fast - slow;
  const signal = calcEMA(closes.slice(-9), 9);
  return {v:+macd.toFixed(3), s:+signal.toFixed(3), h:+(macd-signal).toFixed(3)};
}

function calcVWAP(candles) {
  if (!candles.length) return 0;
  let cumVP=0, cumV=0;
  candles.forEach(c => {
    const tp = (c.h+c.l+c.c)/3;
    cumVP += tp * c.v;
    cumV += c.v;
  });
  return cumV ? +(cumVP/cumV).toFixed(2) : 0;
}

function calcBollinger(closes, period=20) {
  if (closes.length < period) return {u:0,m:0,l:0};
  const slice = closes.slice(-period);
  const mean = slice.reduce((a,b)=>a+b,0)/period;
  const std = Math.sqrt(slice.reduce((a,b)=>a+(b-mean)**2,0)/period);
  return {u:+(mean+2*std).toFixed(2), m:+mean.toFixed(2), l:+(mean-2*std).toFixed(2)};
}

function calcATR(candles, period=14) {
  if (candles.length < period+1) return 0;
  let sum=0;
  for (let i=candles.length-period; i<candles.length; i++) {
    const tr = Math.max(candles[i].h-candles[i].l, Math.abs(candles[i].h-candles[i-1].c), Math.abs(candles[i].l-candles[i-1].c));
    sum += tr;
  }
  return +(sum/period).toFixed(3);
}

// ═══════════════════════════════════════════════════════════════
// ★★★ الفلاتر الذكية — محرك اكتشاف العقود الجاهزة ★★★
// ═══════════════════════════════════════════════════════════════

// 1. فلتر انضغاط بولنجر (Bollinger Squeeze)
function detectSqueeze(candles) {
  if (candles.length < 20) return {active:false,score:0};
  const closes = candles.map(c=>c.c);
  const boll = calcBollinger(closes);
  const atr = calcATR(candles);
  const bandwidth = (boll.u - boll.l) / boll.m;
  // انضغاط = عرض بولنجر ضيق جداً
  const squeezed = bandwidth < 0.04;
  const score = squeezed ? Math.min(100, Math.round((0.04-bandwidth)/0.04*100)) : 0;
  return {active:squeezed, score, bandwidth:+bandwidth.toFixed(4)};
}

// 2. فلتر RVI — مؤشر القوة النسبية للتقلب
function calcRVI(candles, period=10) {
  if (candles.length < period+1) return 50;
  let upVol=0, dnVol=0;
  for (let i=candles.length-period; i<candles.length; i++) {
    const range = candles[i].h - candles[i].l;
    if (candles[i].c > candles[i].o) upVol += range;
    else dnVol += range;
  }
  const total = upVol + dnVol;
  return total ? Math.round(upVol/total*100) : 50;
}

// 3. فلتر الفركتال — كسر هيكلي
function detectFractal(candles) {
  if (candles.length < 5) return 'محايد';
  const n = candles.length;
  const mid = candles[n-3];
  // فركتال صعودي = القاع الأوسط أقل من الجيران
  if (mid.l < candles[n-4].l && mid.l < candles[n-2].l && mid.l < candles[n-5].l && mid.l < candles[n-1].l) return 'صعودي';
  // فركتال هبوطي = القمة الوسطى أعلى من الجيران
  if (mid.h > candles[n-4].h && mid.h > candles[n-2].h && mid.h > candles[n-5].h && mid.h > candles[n-1].h) return 'هبوطي';
  return 'محايد';
}

// 4. فلتر تدفق السيولة الذكية (Volume Profile)
function detectSmartFlow(candles) {
  if (candles.length < 10) return {type:'عادي',score:0};
  const recent = candles.slice(-5);
  const prev = candles.slice(-10,-5);
  const recentVol = recent.reduce((a,c)=>a+c.v,0);
  const prevVol = prev.reduce((a,c)=>a+c.v,0);
  const ratio = prevVol ? recentVol/prevVol : 1;
  const upCandles = recent.filter(c=>c.c>c.o).length;

  if (ratio > 2.5 && upCandles >= 4) return {type:'سويب',score:95};
  if (ratio > 2 && upCandles >= 3) return {type:'بلوك',score:80};
  if (ratio > 1.5) return {type:'تراكم',score:60};
  return {type:'عادي',score:30};
}

// 5. فلتر انفجار الحجم (Volume Explosion)
function detectVolumeExplosion(candles) {
  if (candles.length < 20) return {exploding:false,ratio:1};
  const avgVol = candles.slice(-20,-1).reduce((a,c)=>a+c.v,0)/19;
  const lastVol = candles[candles.length-1].v;
  const ratio = avgVol ? lastVol/avgVol : 1;
  return {exploding:ratio>3, ratio:+ratio.toFixed(1)};
}

// 6. فلتر الدايفرجنس (RSI Divergence)
function detectDivergence(candles) {
  if (candles.length < 30) return 'لا يوجد';
  const closes = candles.map(c=>c.c);
  const rsiNow = calcRSI(closes);
  const rsiPrev = calcRSI(closes.slice(0,-5));
  const priceUp = closes[closes.length-1] > closes[closes.length-6];
  const rsiDown = rsiNow < rsiPrev;
  if (priceUp && rsiDown) return 'هبوطي سلبي'; // سعر يرتفع + RSI ينخفض
  if (!priceUp && !rsiDown) return 'صعودي إيجابي'; // سعر ينخفض + RSI يرتفع
  return 'لا يوجد';
}

// 7. فلتر فجوة القيمة العادلة (FVG)
function detectFVG(candles) {
  if (candles.length < 3) return {detected:false};
  const c1 = candles[candles.length-3];
  const c3 = candles[candles.length-1];
  // فجوة صعودية
  if (c3.l > c1.h) return {detected:true, type:'صعودية', gap:+(c3.l-c1.h).toFixed(2)};
  // فجوة هبوطية
  if (c3.h < c1.l) return {detected:true, type:'هبوطية', gap:+(c1.l-c3.h).toFixed(2)};
  return {detected:false};
}

// 8. ★ نقاط الانفجار الشاملة — المحرك الرئيسي ★
function calcExplosionScore(data, candles) {
  let score = 0;
  const closes = candles.map(c=>c.c);
  const price = data.price;
  const vwap = calcVWAP(candles.slice(-20));

  // 1. فوق VWAP (+15)
  if (price > vwap) score += 15;

  // 2. RSI في المنطقة الذهبية 40-60 (+10) أو تشبع بيعي <30 (+15)
  const rsi = calcRSI(closes);
  if (rsi < 30) score += 15;
  else if (rsi >= 40 && rsi <= 60) score += 10;

  // 3. MACD تقاطع صعودي (+15)
  const macd = calcMACD(closes);
  if (macd.h > 0 && macd.v > macd.s) score += 15;

  // 4. انضغاط بولنجر (+20)
  const squeeze = detectSqueeze(candles);
  if (squeeze.active) score += 20;

  // 5. تدفق سيولة ذكية (+15)
  const flow = detectSmartFlow(candles);
  if (flow.type === 'سويب') score += 15;
  else if (flow.type === 'بلوك') score += 10;

  // 6. انفجار حجم (+10)
  const volExp = detectVolumeExplosion(candles);
  if (volExp.exploding) score += 10;

  // 7. فركتال صعودي (+10)
  const fractal = detectFractal(candles);
  if (fractal === 'صعودي') score += 10;

  // 8. RVI قوي > 60 (+10)
  const rvi = calcRVI(candles);
  if (rvi > 60) score += 10;

  // 9. دايفرجنس إيجابي (+5)
  const div = detectDivergence(candles);
  if (div === 'صعودي إيجابي') score += 5;

  return Math.min(100, score);
}

// ═══════════════════════════════════════════════════════════════
// توليد عقود الأوبشن مع البيانات الحقيقية
// ═══════════════════════════════════════════════════════════════
function generateContracts(stockData) {
  const contracts = [];
  const now = new Date();

  STOCKS.forEach(stk => {
    const data = stockData[stk.s];
    if (!data || !data.price) return;

    const price = data.price;
    const candles = data.candles || [];
    const closes = candles.map(c=>c.c);

    // حساب المؤشرات الحقيقية
    const rsi = calcRSI(closes);
    const macd = calcMACD(closes);
    const vwap = calcVWAP(candles.slice(-20));
    const boll = calcBollinger(closes);
    const atr = calcATR(candles);
    const rvi = calcRVI(candles);
    const squeeze = detectSqueeze(candles);
    const fractal = detectFractal(candles);
    const flow = detectSmartFlow(candles);
    const volExp = detectVolumeExplosion(candles);
    const div = detectDivergence(candles);
    const fvg = detectFVG(candles);
    const explosionScore = calcExplosionScore(data, candles);

    // توليد 1-3 عقود لكل سهم
    const numContracts = rndI(1,3);
    for (let i=0; i<numContracts; i++) {
      const isCall = rsi < 50 ? Math.random()>0.3 : Math.random()>0.6; // ميل للكول لو RSI منخفض
      const offset = (Math.random()-0.3) * price * 0.08;
      const strike = +((Math.round((price+offset)/0.5)*0.5)).toFixed(0);
      const expDays = [7,14,21,30,45][rndI(0,4)];
      const expiry = new Date(now.getTime()+expDays*86400000);

      const volume = rndI(800, 20000);
      const oi = rndI(200, 12000);
      const askPrice = +(rnd(0.5, Math.max(1, price*0.05))).toFixed(2);
      const bidPrice = +(askPrice * rnd(0.88,0.96)).toFixed(2);
      const iv = +(rnd(15, 120)).toFixed(1);
      const delta = isCall ? +rnd(0.15,0.85).toFixed(2) : -rnd(0.15,0.85).toFixed(2);
      const gamma = +rnd(0.001,0.06).toFixed(4);
      const theta = -rnd(0.01,0.2).toFixed(4);

      // أفضل دخول ووقف خسارة
      const bestEntry = +(askPrice * 0.98).toFixed(2);
      const stopLossFixed = +(askPrice * 0.80).toFixed(2);
      const low15m = candles.length ? +(candles[candles.length-1].l * 0.98 * (askPrice/price)).toFixed(2) : stopLossFixed;
      const stopLoss = +Math.min(stopLossFixed, low15m > 0 ? low15m : stopLossFixed).toFixed(2);

      // دعم ومقاومة
      const support1 = +(price - atr*1.5).toFixed(2);
      const support2 = +(price - atr*3).toFixed(2);
      const resistance1 = +(price + atr*1.5).toFixed(2);
      const resistance2 = +(price + atr*3).toFixed(2);

      // هدف العقد
      const targetMove = isCall ? resistance1 - price : price - support1;
      const pricePrediction = +(askPrice + targetMove * Math.abs(delta)).toFixed(2);

      const moneyness = strike < price ? (isCall?'ITM':'OTM') : strike > price ? (isCall?'OTM':'ITM') : 'ATM';
      const strongBuy = volume > oi;
      const unusual = volume > oi * 1.8;
      const darkPool = Math.random() > 0.75;
      const smartMoney = flow.type==='سويب' || flow.type==='بلوك';
      const qualifies = explosionScore > 75 && price > vwap;

      contracts.push({
        id: `${stk.s}-${strike}${isCall?'C':'P'}-${expDays}`,
        ticker: stk.s, name: stk.n, sector: stk.sec,
        stockPrice: price, strike,
        type: isCall ? 'CALL' : 'PUT',
        typeAr: isCall ? 'شراء' : 'بيع',
        expiry: expiry.toISOString().split('T')[0],
        expiryDays: expDays,
        volume, openInterest: oi,
        volOiRatio: +(volume/oi).toFixed(2),
        askPrice, bidPrice, bestEntry, stopLoss,
        iv, delta, gamma, theta: +theta,
        rsi, macd, vwap, boll, atr, rvi,
        explosionScore, squeeze, fractal, flow,
        volExplosion: volExp, divergence: div, fvg,
        vwapAbove: price > vwap,
        support1, support2, resistance1, resistance2,
        target1: isCall ? resistance1 : support1,
        target2: isCall ? resistance2 : support2,
        pricePrediction,
        moneyness, strongBuy, unusual, darkPool, smartMoney, qualifies,
        sparkline: candles.slice(-20).map(c=>c.c),
        changePct: data.changePct || 0,
      });
    }
  });

  return contracts.sort((a,b) => b.explosionScore - a.explosionScore);
}

// ═══════════════════════════════════════════════════════════════
// رسم الشارت المصغر (Sparkline)
// ═══════════════════════════════════════════════════════════════
function drawSparkline(canvas, data, w=120, h=30) {
  if (!data || data.length < 2) return;
  canvas.width = w; canvas.height = h;
  const ctx = canvas.getContext('2d');
  const min = Math.min(...data), max = Math.max(...data);
  const range = max - min || 1;
  const isUp = data[data.length-1] > data[0];
  const color = isUp ? '#00e5a0' : '#ef4444';

  ctx.beginPath();
  data.forEach((v,i) => {
    const x = (i/(data.length-1)) * w;
    const y = h - ((v-min)/range) * (h-4) - 2;
    i===0 ? ctx.moveTo(x,y) : ctx.lineTo(x,y);
  });
  ctx.strokeStyle = color;
  ctx.lineWidth = 1.5;
  ctx.stroke();

  // تعبئة
  ctx.lineTo(w, h);
  ctx.lineTo(0, h);
  ctx.closePath();
  const grad = ctx.createLinearGradient(0,0,0,h);
  grad.addColorStop(0, isUp?'rgba(0,229,160,.2)':'rgba(239,68,68,.2)');
  grad.addColorStop(1, 'transparent');
  ctx.fillStyle = grad;
  ctx.fill();
}

// ═══════════════════════════════════════════════════════════════
// رسم عداد السرعة (Gauge)
// ═══════════════════════════════════════════════════════════════
function createGaugeSVG(value, size=110, label='RVI') {
  const pct = Math.min(value/100, 1);
  const angle = pct * 180;
  const r = size * 0.38;
  const cx = size/2, cy = size * 0.55;
  const sw = size * 0.07;

  const p2c = a => ({
    x: cx + r * Math.cos(Math.PI*(180-a)/180),
    y: cy - r * Math.sin(Math.PI*(180-a)/180)
  });

  const s = p2c(0), e = p2c(angle);
  const la = angle > 180 ? 1 : 0;
  const bg = p2c(180);

  const color = value<25?'#ef4444':value<50?'#f59e0b':value<65?'#eab308':value<80?'#22c55e':'#00e5a0';

  return `<svg width="${size}" height="${size*.62}" viewBox="0 0 ${size} ${size*.62}">
    <defs><filter id="g${value}"><feGaussianBlur stdDeviation="2" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter></defs>
    <path d="M ${s.x} ${s.y} A ${r} ${r} 0 0 1 ${bg.x} ${bg.y}" fill="none" stroke="rgba(255,255,255,.06)" stroke-width="${sw}" stroke-linecap="round"/>
    ${angle>0.5?`<path d="M ${s.x} ${s.y} A ${r} ${r} 0 ${la} 1 ${e.x} ${e.y}" fill="none" stroke="${color}" stroke-width="${sw}" stroke-linecap="round" filter="url(#g${value})"/>`:''}
    <line x1="${cx}" y1="${cy}" x2="${e.x}" y2="${e.y}" stroke="${color}" stroke-width="2" stroke-linecap="round" filter="url(#g${value})"/>
    <circle cx="${cx}" cy="${cy}" r="3" fill="${color}"/>
    <text x="${cx}" y="${cy+size*.02}" text-anchor="middle" fill="${color}" font-size="${size*.15}" font-weight="700" font-family="IBM Plex Mono,monospace">${value}</text>
    <text x="${cx}" y="${cy-size*.2}" text-anchor="middle" fill="#475569" font-size="${size*.08}" font-family="IBM Plex Mono,monospace">${label}</text>
  </svg>`;
}

function getFiltered() {

  // قطاع

  // نوع
  if (STATE.filter==='calls') cc = cc.filter(c=>c.type==='CALL');

  else if (STATE.filter==='qualified') cc = cc.filter(c=>c.qualifies);

  // ترتيب
  const sorts = {

    volume: (a,b) => b.volume - a.volume,
    voloi: (a,b) => b.volOiRatio - a.volOiRatio,
    rvi: (a,b) => b.rvi - a.rvi,
    sweep: (a,b) => (b.flow.type==='سويب'?1:0) - (a.flow.type==='سويب'?1:0),
    money: (a,b) => (b.smartMoney?1:0) - (a.smartMoney?1:0),
  };
  cc.sort(sorts[STATE.sort] || sorts.score);

  return cc;
}

function renderCards() {
  const cc = getFiltered();
  const el = document.getElementById('cardsList');

  if (!cc.length) {
    el.innerHTML = '<div class="empty"><div class="empty-icon">📊</div>لا توجد عقود مطابقة للفلاتر الحالية</div>';
    return;
  }

  el.innerHTML = cc.map(c => {
    const isCall = c.type==='CALL';
    const atEntry = Math.random()>0.7;
    const badges = [];
    if (c.strongBuy) badges.push(badgeHTML('شراء قوي','badge-up',false,'⚡'));
    if (c.unusual) badges.push(badgeHTML('غير عادي','badge-hot',false,'🔥'));
    if (c.smartMoney) badges.push(badgeHTML('سمارت $','badge-gold',false,'💰'));
    if (c.darkPool) badges.push(badgeHTML('دارك بول','badge-pu',false,'◉'));
    if (c.squeeze.active) badges.push(badgeHTML('انضغاط','badge-warn',true,'💥'));

    badges.push(badgeHTML('حجم/OI '+c.volOiRatio+'x', c.volOiRatio>1.5?'badge-hot':'badge-muted'));

    return `
    <div class="card ${c.explosionScore>=90?'hot':''}" onclick="openSheet('${c.id}')">
      <div class="card-head">
        <div class="card-ticker">
          <div class="card-icon ${isCall?'call':'put'}">${isCall?'▲C':'▼P'}</div>

            <div class="card-sym">${c.ticker}</div>
            <div class="card-detail mono">$${c.strike} ${c.typeAr} · ${c.expiryDays} يوم · ${c.moneyness}</div>

          <div class="card-ask-price mono" style="color:var(--t1)">$${c.askPrice}</div>
          <div class="card-ask-label">سعر الطلب</div>
        </div>
      </div>

      <div class="card-metrics">
        <div><div class="metric-label">الحجم</div><div class="metric-val mono">${fmtK(c.volume)}</div></div>
        <div><div class="metric-label">OI</div><div class="metric-val mono">${fmtK(c.openInterest)}</div></div>
        <div><div class="metric-label">IV</div><div class="metric-val mono" style="color:var(--warn)">${c.iv}%</div></div>

  // رسم الشارتات المصغرة
  requestAnimationFrame(() => {
    cc.forEach(c => {

      if (canvas) drawSparkline(canvas, c.sparkline);
    });

// ═══════════════════════════════════════════════════════════════
function openSheet(id) {
  const c = STATE.contracts.find(x=>x.id===id);
  if (!c) return;
  STATE.selected = c;
  STATE.sheetTab = 'levels';

  const overlay = document.getElementById('sheetOverlay');
  overlay.classList.add('show');

  const isCall = c.type==='CALL';
  document.getElementById('sheetHeader').innerHTML = `
    <div style="display:flex;align-items:center;gap:10px">
      <div class="card-icon ${isCall?'call':'put'}" style="width:36px;height:36px;font-size:11px">${isCall?'▲C':'▼P'}</div>
      <div>
        <div style="font-weight:700;font-size:13px">${c.ticker} — $${fmt(c.stockPrice)}</div>
        <div style="font-size:10px;color:var(--t3)">${c.name} · ${c.sector}</div>
      </div>
    </div>
    <button class="sheet-close" onclick="closeSheet()">✕</button>`;

  document.getElementById('sheetTabs').innerHTML = [
    {id:'levels',l:'الدعم/المقاومة'},
    {id:'signals',l:'الإشارات'},
    {id:'predict',l:'التوقع'},
  ].map(t => `<button class="sheet-tab ${STATE.sheetTab===t.id?'on':''}" onclick="setSheetTab('${t.id}')">${t.l}</button>`).join('');

  renderSheetContent();

  // سحب للإغلاق
  let startY=0, dy=0;
  const sheet = document.getElementById('sheet');
  sheet.ontouchstart = e => { startY = e.touches[0].clientY; };
  sheet.ontouchmove = e => {
    dy = e.touches[0].clientY - startY;
    if (dy > 0) sheet.style.transform = `translateY(${dy}px)`;
  };
  sheet.ontouchend = () => {
    if (dy > 120) closeSheet();
    else { sheet.style.transform = ''; dy = 0; }
  };
}

function closeSheet() {
  document.getElementById('sheetOverlay').classList.remove('show');
  document.getElementById('sheet').style.transform = '';
}

function setSheetTab(tab) {
  STATE.sheetTab = tab;
  document.querySelectorAll('.sheet-tab').forEach(b => b.classList.toggle('on', b.textContent.includes(
    tab==='levels'?'الدعم':tab==='signals'?'الإشارات':'التوقع'
  )));
  renderSheetContent();
}

function selectContract(id) {

}

  const prompt = `أنت محلل أوبشن أمريكي خبير. حلل هذا العقد باختصار:

حجم: ${c.volume} | OI: ${c.openInterest} | نسبة: ${c.volOiRatio}x
نقاط الانفجار: ${c.explosionScore}% | RVI: ${c.rvi}
RSI: ${c.rsi} | MACD: ${c.macd.h>0?'صعودي':'هبوطي'}
${c.vwapAbove?'فوق VWAP':'تحت VWAP'} | فركتال: ${c.fractal}
التدفق: ${c.flow.type} | الانضغاط: ${c.squeeze.active?'نشط':'لا'}

المطلوب: 1) تقييم سريع 2) نقطة دخول وهدف ووقف 3) المخاطر. أجب بالعربية بإيجاز.`;

  try {
    const r = await fetch('/api/ai', {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify({prompt})
    });
    const d = await r.json();
    const txt = d.content?.[0]?.text || 'تعذر الحصول على التحليل';
    document.getElementById('aiBody').innerHTML = `<div class="ai-result">${txt.replace(/\*\*(.*?)\*\*/g,'<b>$1</b>').replace(/\n/g,'<br>')}</div>`;
  } catch(e) {
    document.getElementById('aiBody').innerHTML = `<div style="color:var(--dn);text-align:center;padding:20px">خطأ: ${e.message}</div>`;
  }
}

// ═══════════════════════════════════════════════════════════════
// عرض الكل
// ═══════════════════════════════════════════════════════════════
function renderAll() {
  renderStats();
  renderCards();
  renderDesktop();
  renderUnderlyingPanel();

  const cc = getFiltered();
  const qual = cc.filter(c=>c.qualifies).length;
  document.getElementById('footer').textContent = `${cc.length} عقد · ${qual} مؤهل (انفجار>75 + فوق VWAP) · ترتيب: ${STATE.sort}`;
}

// ═══════════════════════════════════════════════════════════════
// الفحص الشامل — جلب بيانات حقيقية
// ═══════════════════════════════════════════════════════════════
async function runScan() {
  if (STATE.loading) return;
  STATE.loading = true;

  const btn = document.getElementById('scanBtn');
  btn.classList.add('scanning');
  btn.textContent = '⟳ جاري الفحص...';

  document.getElementById('cardsList').innerHTML = '<div class="empty"><div class="empty-icon">⚡</div>جاري فحص السوق الأمريكي...</div>';
  document.getElementById('footer').textContent = 'جاري جلب البيانات من Yahoo Finance...';

  const stockData = {};

  // جلب البيانات على دفعات (3 أسهم في نفس الوقت)
  const batchSize = 3;
  for (let i=0; i<STOCKS.length; i+=batchSize) {
    const batch = STOCKS.slice(i, i+batchSize);
    const results = await Promise.allSettled(
      batch.map(stk => fetchStockData(stk.s))
    );
    results.forEach((r, idx) => {
      if (r.status === 'fulfilled' && r.value) {
        stockData[batch[idx].s] = r.value;
      }
    });
    document.getElementById('footer').textContent = `جاري الجلب... ${Math.min(i+batchSize, STOCKS.length)}/${STOCKS.length} سهم`;
  }

  STATE.prices = stockData;
  STATE.contracts = generateContracts(stockData);

  renderAll();
  renderSectors();

  STATE.loading = false;
  btn.classList.remove('scanning');
  btn.textContent = '⚡ فحص شامل';
}

// ═══════════════════════════════════════════════════════════════
// ربط الأحداث
// ═══════════════════════════════════════════════════════════════
document.getElementById('filterBar').addEventListener('click', e => {
  const btn = e.target.closest('[data-f]');
  if (btn) setFilter(btn.dataset.f);
  const sbtn = e.target.closest('[data-s]');
  if (sbtn) setSort(sbtn.dataset.s);
});

document.getElementById('sheetOverlay').addEventListener('click', e => {
  if (e.target === e.currentTarget) closeSheet();
});

// ═══════════════════════════════════════════════════════════════
// بدء التشغيل
// ═══════════════════════════════════════════════════════════════
renderSectors();
renderStats();
document.getElementById('cardsList').innerHTML = '<div class="empty"><div class="empty-icon">⚡</div>اضغط "فحص شامل" لتحليل سوق الأوبشن الأمريكي</div>';

// فحص تلقائي عند التحميل
setTimeout(runScan, 500);
</script>
